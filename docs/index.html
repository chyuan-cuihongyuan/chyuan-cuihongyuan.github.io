<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>chyuan 技术小站</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="chyuan 的个人技术博客 - 记录成长，分享技术，探索未知">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <!-- Theme CSS -->
  <link rel="stylesheet" href="/assets/css/vue.css">
  <link rel="stylesheet" href="/assets/css/custom.css">
  <link rel="stylesheet" href="/assets/css/gitalk.css">
  <!-- Baidu Analytics -->
  <script>
    var _hmt = _hmt || [];
    (function () {
      var hm = document.createElement("script");
      hm.src = "https://hm.baidu.com/hm.js?b3354307876925c625a24bb138d2177c";
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
  </script>
  <style>
    /* Smooth page transitions */
    .content, .markdown-section {
      transition: opacity 0.2s ease;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script>
    var gitalkConfig = {
      clientID: '4a657aa4ae6123c0f1862a1',
      clientSecret: '94793d5bac0123c884a8798ea941f7c5bc9fb004720',
      repo: 'chyuan.github.io',
      owner: 'chyuan-cuihongyuan',
      admin: ["chyuan-cuihongyuan"],
      distractionFreeMode: false
    };
    window.$docsify = {
      name: 'chyuan',
      repo: 'https://github.com/chyuan-cuihongyuan/chyuan.github.io',
      auto2top: true,
      coverpage: true,
      loadSidebar: true,
      maxLevel: 4,
      subMaxLevel: 2,
      search: {
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '没有找到相关结果',
        depth: 6
      },
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true
      },
      plugins: [
        function (hook, vm) {
          hook.doneEach(function () {
            var label, domObj, main, divEle, gitalk;
            label = md5(decodeURI(vm.route.path.split("/").pop()));
            domObj = Docsify.dom;
            main = domObj.getNode("#main");

            Array.apply(
              null,
              document.querySelectorAll("div.gitalk-container")
            ).forEach(function (ele) {
              ele.remove();
            });

            divEle = domObj.create("div");
            divEle.id = "gitalk-container-" + label;
            divEle.className = "gitalk-container";
            divEle.style = "width: " + main.clientWidth + "px; margin: 0 auto 20px;";
            domObj.appendTo(domObj.find(".content"), divEle);
            gitalk = new Gitalk(
              Object.assign(gitalkConfig, { id: !label ? "home" : label })
            );
            gitalk.render("gitalk-container-" + label);
          });
        }
      ]
    }
  </script>

  <!-- Scripts -->
  <script src="/assets/js/md5.js"></script>
  <script src="/assets/js/docsify.min.js"></script>
  <script src="/assets/js/gitalk.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="/assets/js/docsify-pagination.min.js"></script>
  <script src="/assets/js/zoom-image.js"></script>
  <script src="/assets/js/prism-bash.js"></script>
  <script src="/assets/js/prism-java.min.js"></script>
</body>

</html>
